<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isochrone</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Isochrone</h1>
        <label class="mode-select" for="mode-select">Transport modes</label>
        <select id="mode-select" name="mode-select" multiple size="3">
          <option value="walk">Walk</option>
          <option value="bike">Bike</option>
          <option value="car" selected>Car</option>
        </select>
        <label for="colour-cycle-minutes">Colour cycle (min)</label>
        <input
          id="colour-cycle-minutes"
          name="colour-cycle-minutes"
          type="number"
          min="5"
          step="5"
          value="60"
        />
        <label for="departure-time">Departure time</label>
        <input id="departure-time" name="departure-time" type="time" value="08:00" step="60" />
      </header>

      <section id="map-region" class="map-region" aria-label="Map viewport">
        <div id="canvas-stack" class="canvas-stack">
          <canvas
            id="boundaries"
            width="1024"
            height="768"
            aria-label="Berlin district boundary basemap"
          ></canvas>
          <canvas id="isochrone" width="1024" height="768" aria-label="Berlin map canvas"></canvas>
        </div>
        <div id="loading" role="status" aria-live="polite">
          <div id="loading-text">Loading district boundaries...</div>
          <div id="loading-progress" aria-hidden="true">
            <div id="loading-progress-bar"></div>
          </div>
        </div>
        <div id="isochrone-legend" aria-live="polite"></div>
        <div id="distance-scale" aria-label="Distance scale bar">
          <div id="distance-scale-line"></div>
          <div id="distance-scale-label">1 km</div>
        </div>
      </section>
      <div id="routing-status" role="status" aria-live="polite">Ready.</div>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
