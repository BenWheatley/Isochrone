<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Isochrone</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Isochrone</h1>
        <label for="departure-time">Departure time</label>
        <input id="departure-time" name="departure-time" type="time" value="08:00" step="60" />
        <label for="time-limit-minutes">Walk limit</label>
        <input
          id="time-limit-minutes"
          name="time-limit-minutes"
          type="range"
          min="5"
          max="90"
          step="5"
          value="30"
        />
        <output id="time-limit-value" for="time-limit-minutes">30 min</output>
      </header>

      <section class="map-region" aria-label="Map viewport">
        <div id="canvas-stack" class="canvas-stack">
          <canvas
            id="boundaries"
            width="1024"
            height="768"
            aria-label="Berlin district boundary basemap"
          ></canvas>
          <canvas id="isochrone" width="1024" height="768" aria-label="Berlin map canvas"></canvas>
        </div>
        <div id="loading" role="status" aria-live="polite">
          <div id="loading-text">Loading district boundaries...</div>
          <div id="loading-progress" aria-hidden="true">
            <div id="loading-progress-bar"></div>
          </div>
        </div>
      </section>
      <div id="routing-status" role="status" aria-live="polite">Ready.</div>
    </main>
    <script type="module" src="./src/app.js"></script>
  </body>
</html>
