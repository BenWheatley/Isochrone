name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Install Rust toolchain for WASM kernel
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build routing kernel WASM
        run: make wasm-build

      - name: Prepare static site artifact
        run: |
          set -euxo pipefail
          mkdir -p site/src site/wasm site/data_pipeline/output
          cp web/index.html site/index.html
          cp -R web/src/. site/src/
          cp web/wasm/routing-kernel.wasm site/wasm/
          cp data_pipeline/output/berlin-district-boundaries-canvas.json site/data_pipeline/output/
          cp data_pipeline/output/graph-walk.bin.gz site/data_pipeline/output/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: build-pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
